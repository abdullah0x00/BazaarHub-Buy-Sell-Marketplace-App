name: marketplace_app
description: A professional Buy & Sell Marketplace App built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # UI & Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.4.1
  smooth_page_indicator: ^1.1.0
  fl_chart: ^0.66.2
  shimmer: ^3.0.0
  badges: ^3.1.2
  carousel_slider: ^4.2.1
  flutter_rating_bar: ^4.0.1

  # Storage & Shared Preferences
  shared_preferences: ^2.2.2

  # Utils
  intl: ^0.18.1
  image_picker: ^1.2.1
  uuid: ^4.3.3
  mobile_scanner: ^3.5.2
  http: ^1.1.0

  # Firebase
  firebase_core: ^3.10.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.2
  firebase_storage: ^12.4.1
  firebase_analytics: ^11.4.1
  google_sign_in: 6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
